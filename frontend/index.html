                } else if (state === 'error') {
                    if (errorAvatar) {
                        errorAvatar.setVisible(true);
                        errorAvatar.setAlpha(1);
                        errorAvatar.setDepth(50);
                        errorAvatar.setPosition(1007, 221);
                        playLoopOrFallback(errorAvatar, 'error_bug');
                    } else {
                        ensureStarSafe(areas.error.x, areas.error.y);
                    }
                } else {
                    ensureStarSafe(areas.breakroom.x, areas.breakroom.y);
                }

                if (!forceVisible) return;

                const visibleMain = [mainStar, workingStar, syncAvatar, errorAvatar].filter(s => s && s.visible && (s.alpha ?? 1) > 0);
                if (visibleMain.length === 0) {
                    if (allowDebugLog) {
                        console.warn('[avatar-guard] no main avatar visible, recovering with star idle', { state });
                    }
                    ensureStarSafe(areas.breakroom.x, areas.breakroom.y);
                }
            },
            resolvePrimaryAnchorForBubble(stateKey) {
                const bubbleState = normalizeState(stateKey || getEffectiveResolvedState());
                if (bubbleState === 'syncing' && syncAnimSprite && syncAnimSprite.visible) {
                    return { x: syncAnimSprite.x, y: syncAnimSprite.y };
                }
                if (bubbleState === 'error' && window.errorBug && window.errorBug.visible) {
                    return { x: window.errorBug.x, y: window.errorBug.y };
                }
                if (star && !star.visible && window.starWorking && window.starWorking.visible) {
                    return { x: window.starWorking.x, y: window.starWorking.y };
                }
                return { x: star?.x ?? 0, y: star?.y ?? 0 };
            }
        };

        function ensureCatSpriteVisible() { AvatarRenderer.ensureCatSpriteVisible(); }
        function applyPrimaryAvatarVisibility(stateKey, options = {}) { AvatarRenderer.applyPrimaryAvatarVisibility(stateKey, options); }

        function fetchStatus() {
            return StateService.fetchStatusRaw()
                .then(data => {
                    try {
                        const resolved = resolvePrimaryStatusSnapshot(data);
                        const nextState = resolved.state;
                        const resolvedDetail = resolved.detail;
                        latestResolvedState = nextState;

                        const stateInfo = STATES[nextState] || STATES.idle;
                        const displayDetail = formatStatusDetail(nextState, resolvedDetail, uiLang);
                        const changed = (pendingDesiredState === null) && (nextState !== currentState);
                        const nextLine = '[' + stateInfo.name + '] ' + displayDetail;
                        if (changed) {
                            typewriterTarget = nextLine;
                            typewriterText = '';
                            typewriterIndex = 0;

                            pendingDesiredState = null;
                            currentState = nextState;

                            sofa.anims.stop();
                            sofa.setTexture('sofa_idle');
                            applyPrimaryAvatarVisibility(nextState, { forceVisible: true, debug: true });
                            ensureCatSpriteVisible();

                            if (serverroom) {
                                if (nextState === 'idle') {
                                    serverroom.anims.stop();
                                    serverroom.setFrame(0);
                                } else {
                                    serverroom.anims.play('serverroom_on', true);
                                }
                            }
                        } else {
                            if (!typewriterTarget || typewriterTarget !== nextLine) {
                                typewriterTarget = nextLine;
                                typewriterText = '';
                                typewriterIndex = 0;
                            }
                            applyPrimaryAvatarVisibility(nextState, { forceVisible: true, debug: false });
                            ensureCatSpriteVisible();
                        }
                    } catch (err) {
                        console.error('fetchStatus apply error', err);
                        typewriterTarget = 'Status update error, recovering...';
                        typewriterText = '';
                        typewriterIndex = 0;
                    }
                })
                .catch(error => {
                    typewriterTarget = 'Connection failed, retrying...';
                    typewriterText = '';
                    typewriterIndex = 0;
                });
        }

        function moveStar(time) {
            const effectiveState = getEffectiveResolvedState();
            const stateInfo = STATES[effectiveState] || STATES.idle;
            const baseTarget = areas[stateInfo.area] || areas.breakroom;

            if (effectiveState === 'idle' || effectiveState === 'waiting') {
                applyPrimaryAvatarVisibility(effectiveState, { forceVisible: true, debug: false });
                ensureCatSpriteVisible();
                isMoving = false;
                return;
            }

            const dx = targetX - star.x;
            const dy = targetY - star.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const speed = 1.4;
            const wobble = Math.sin(time / 200) * 0.8;

            if (dist > 3) {
                star.x += (dx / dist) * speed;
                star.y += (dy / dist) * speed;
                star.setY(star.y + wobble);
                isMoving = true;
            } else {
                if (waypoints && waypoints.length > 0) {
                    waypoints.shift();
                    if (waypoints.length > 0) {
                        targetX = waypoints[0].x;
                        targetY = waypoints[0].y;
                        isMoving = true;
                    } else {
                        if (pendingDesiredState !== null) {
                            isMoving = false;
                            currentState = pendingDesiredState;
                            pendingDesiredState = null;

                            if (currentState === 'idle' || currentState === 'waiting') {
                                applyPrimaryAvatarVisibility(currentState, { forceVisible: true, debug: false });
                                sofa.anims.stop();
                                sofa.setTexture('sofa_idle');
                            } else {
                                star.setVisible(false);
                                star.anims.stop();
                                if (window.starWorking) {
                                    window.starWorking.setVisible(true);
                                    window.starWorking.anims.play('star_working', true);
                                }
                            }
                        }
                    }
                } else {
                    if (pendingDesiredState !== null) {
                        isMoving = false;
                        currentState = pendingDesiredState;
                        pendingDesiredState = null;

                        if (currentState === 'idle' || currentState === 'waiting') {
                            applyPrimaryAvatarVisibility(currentState, { forceVisible: true, debug: false });
                            sofa.anims.stop();
                            sofa.setTexture('sofa_idle');
                        } else {
                            star.setVisible(false);
                            star.anims.stop();
                            if (window.starWorking) {
                                window.starWorking.setVisible(true);
                                window.starWorking.anims.play('star_working', true);
                            }
                            sofa.anims.stop();
                            sofa.setTexture('sofa_idle');
                        }
                    }
                }
            }

            ensureCatSpriteVisible();
        }

        const BubbleManager = {
            getBubbleTextsByState(stateKey) {
                const langPack = BUBBLE_TEXTS[uiLang] || BUBBLE_TEXTS.zh;
                return langPack[stateKey] || langPack.idle || [];
            },
            getPrimaryNameTagBounds() {
                if (!primaryNameText || !primaryNameText.visible) return null;
                const half = (primaryNameText.height || 0) / 2;
                return {
                    top: primaryNameText.y - half,
                    bottom: primaryNameText.y + half,
                    height: primaryNameText.height || 0
                };
            },
            resolvePrimaryBubbleY(initialY, bubbleHeight, nameBounds, margin) {
                if (!nameBounds) return initialY;
                const half = bubbleHeight / 2;
                const bubbleTop = initialY - half;
                if (bubbleTop < (nameBounds.bottom + margin)) {
                    return (nameBounds.bottom + margin) + half;
                }
                return initialY;
            },
            showPrimaryBubble() {
                if (bubble) { bubble.destroy(); bubble = null; }
                const bubbleState = getEffectiveResolvedState();
                const texts = this.getBubbleTextsByState(bubbleState);
                if (bubbleState === 'idle') return;

                const anchor = AvatarRenderer.resolvePrimaryAnchorForBubble(bubbleState);
                const text = texts[Math.floor(Math.random() * texts.length)];
                const nameBounds = this.getPrimaryNameTagBounds();

                const isTouch = IS_TOUCH_DEVICE;
                const fontSize = isTouch ? 14 : 12;
                const bubbleHeight = PRIMARY_BUBBLE_DEFAULT_HEIGHT;
                const bubbleHalfHeight = bubbleHeight / 2;
                const nameTagHalfHeight = nameBounds ? (nameBounds.height / 2) : 10;
                const bubbleOffsetY = PRIMARY_NAME_TAG_OFFSET_Y + nameTagHalfHeight + PRIMARY_BUBBLE_GAP_FROM_NAME_TAG + bubbleHalfHeight;
                const intendedBubbleY = anchor.y - bubbleOffsetY;
                const bubbleY = this.resolvePrimaryBubbleY(intendedBubbleY, bubbleHeight, nameBounds, PRIMARY_BUBBLE_COLLISION_PADDING);

                const bg = game.add.rectangle(anchor.x, bubbleY, text.length * 10 + 20, bubbleHeight, 0xffffff, 0.95);
                bg.setStrokeStyle(2, 0x000000);
                const txt = game.add.text(anchor.x, bubbleY, text, { fontFamily: 'ArkPixel, monospace', fontSize: fontSize + 'px', fill: '#000', align: 'center' }).setOrigin(0.5);
                bubble = game.add.container(0, 0, [bg, txt]);
                bubble.setDepth(1200);
                setTimeout(() => { if (bubble) { bubble.destroy(); bubble = null; } }, 3000);
            },
            showCatBubble() {
                if (!window.catSprite) return;
                if (window.catBubble) { window.catBubble.destroy(); window.catBubble = null; }
                ensureCatSpriteVisible();
                const texts = this.getBubbleTextsByState('cat');
                const text = texts[Math.floor(Math.random() * Math.max(1, texts.length))] || 'Meow~';
                const anchorX = window.catSprite.x;
                const anchorY = window.catSprite.y - 60;
                const bg = game.add.rectangle(anchorX, anchorY, text.length * 10 + 20, 24, 0xfffbeb, 0.95);
                bg.setStrokeStyle(2, 0xd4a574);
                const txt = game.add.text(anchorX, anchorY, text, { fontFamily: 'ArkPixel, monospace', fontSize: '11px', fill: '#8b6914', align: 'center' }).setOrigin(0.5);
                window.catBubble = game.add.container(0, 0, [bg, txt]);
                window.catBubble.setDepth(2100);
                setTimeout(() => { if (window.catBubble) { window.catBubble.destroy(); window.catBubble = null; } }, 4000);
            },
            syncGuestBubblePositions() {
                Object.keys(guestBubbles).forEach(id => {
                    const b = guestBubbles[id];
                    const g = guestSprites[id];
                    if (!b || !g) return;
                    if (b.__followAgentId !== id) return;
                    b.x = 0;
                    b.y = 0;
                    const bx = g.sprite.x;
                    const isDemoGuest = (id === 'demo_nika' || id === 'demo_mercury');
                    const nameH = (g.nameText && g.nameText.height) ? g.nameText.height : 16;
                    const by = isDemoGuest ? (g.sprite.y - 90) : ((g.nameText ? g.nameText.y : (g.sprite.y - 150)) - (nameH / 2) - 22);
                    if (b.list && b.list[0]) { b.list[0].x = bx; b.list[0].y = by; }
                    if (b.list && b.list[1]) { b.list[1].x = bx; b.list[1].y = by; }
                });
            }
        };

        function getBubbleTextsByState(stateKey) { return BubbleManager.getBubbleTextsByState(stateKey); }
        function getPrimaryNameTagBounds() { return BubbleManager.getPrimaryNameTagBounds(); }
        function resolvePrimaryBubbleY(initialY, bubbleHeight, nameBounds, margin) { return BubbleManager.resolvePrimaryBubbleY(initialY, bubbleHeight, nameBounds, margin); }
        function showBubble() { BubbleManager.showPrimaryBubble(); }
        function showCatBubble() { BubbleManager.showCatBubble(); }
        // EN Agent EN，EN /agents EN

        // EN
        initGame();
    </script>
